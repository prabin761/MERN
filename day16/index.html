<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        box-sizing: border-box;
      }
      .container {
        height: 30px;
        width: 400px;
        border-radius: 10px;
        background-color: gray;
        margin: auto;
      }
      .box {
        width: 100%
      }
      .box p {
        color: black;
        font-weight: bold;
        height: 30px;
        text-align: end;
        background-color: greenyellow;
        border-radius: 10px;
        animation-name: loading;
        animation-duration: 5s;
        animation-iteration-count: infinite;
      }
      @keyframes loading {
        0% {
          opacity: 0;
          padding-left: 15px;
        }
        10% {
          width: 10%;
        }
        20% {
          width: 20%;
        }
        40% {
          width: 40%;
        }
        50% {
          width: 50%;
        }
        70% {
          width: 70%;
        }
        90% {
          width: 90%;
        }
        100% {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="box">
        <p>loading...</p>
      </div>
    </div>
  </body>
</html>
